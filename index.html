<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jimmy II: THE RETURN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    body {
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1b2735, #090a0f);
      color: #fff;
    }

    .countdown-wrapper {
      text-align: center;
      padding: 2rem 3rem;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.45);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
      max-width: 500px;
      width: 100%;
    }

    .flag {
      width: 60px;
      height: auto;
      margin-bottom: 0.75rem;
      display: inline-block;
    }

    .jimmy-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(148, 163, 184, 0.8);
      margin-bottom: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.95rem;
      margin-bottom: 2rem;
      color: #cfd8dc;
    }

    .time-container {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .time-box {
      min-width: 70px;
      padding: 0.8rem 0.6rem;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.5);
    }

    .time-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .time-label {
      margin-top: 0.15rem;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a0aec0;
    }

    .date-target {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #cbd5f5;
      opacity: 0.85;
    }

    .finished-message {
      font-size: 1.2rem;
      margin-top: 1.5rem;
      color: #4ade80;
      display: none;
    }

    @media (max-width: 480px) {
      .countdown-wrapper {
        padding: 1.75rem 1.5rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      .time-value {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="countdown-wrapper">
    <!-- American flag -->
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg"
      alt="American flag"
      class="flag"
    />

    <!-- Jimmy's photo from the provided URL -->
    <img
      src="https://media.licdn.com/dms/image/v2/C4D03AQG2zzyzT4P69Q/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1524188189929?e=1773878400&v=beta&t=Nx-xRcDzU0fxo-sE0rBj_5WiTs9m6NahUjY14EBv5YQ"
      alt="Jimmy"
      class="jimmy-photo"
    />

    <h1>Jimmy II: THE RETURN</h1>
    <p class="subtitle">Counting down the moments until Jimmy gets here.</p>

    <div class="time-container" id="countdown">
      <div class="time-box">
        <div class="time-value" id="days">0</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="hours">0</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="minutes">0</div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="seconds">0</div>
        <div class="time-label">Seconds</div>
      </div>
    </div>

    <div class="date-target" id="target-text"></div>
    <div class="finished-message" id="finished">
      Jimmy has arrived!
    </div>
  </div>

  <script>
    // Set Jimmy's arrival date and time here (local time).
    // Currently: April 2, 2026 at 17:30 local time
    const targetDate = new Date("2026-04-02T17:30:00");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const finishedEl = document.getElementById("finished");
    const targetTextEl = document.getElementById("target-text");

    // Show a readable target date
    targetTextEl.textContent = "Arrival time: " + targetDate.toLocaleString();

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        secondsEl.textContent = "0";
        finishedEl.style.display = "block";
        clearInterval(timer);
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (3600 * 24));
      const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;

      daysEl.textContent = days;
      hoursEl.textContent = hours.toString().padStart(2, "0");
      minutesEl.textContent = minutes.toString().padStart(2, "0");
      secondsEl.textContent = secs.toString().padStart(2, "0");
    }

    // Initial call and interval
    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
